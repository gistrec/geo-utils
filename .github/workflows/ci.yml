name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make
          sudo cp /usr/src/gtest/lib/*.a /usr/lib

      - name: Build tests
        run: make gtests

      - name: Run tests
        run: ./GTests --gtest_filter=*

  samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sample
        run: make sample

      - name: Run sample
        run: ./Sample
