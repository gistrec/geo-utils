name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev pkg-config

      - name: Build tests
        run: make gtests

      - name: Run tests
        run: ./gtests --gtest_filter=*

  samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sample
        run: make sample

      - name: Run sample
        run: ./sample
